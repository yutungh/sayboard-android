name: Feature request
description: Suggest an improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: feature
    attributes:
      label: What should change?
      description: Describe the feature or behavior you want.
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Why is this useful?
      description: Explain the workflow this would improve.
  - type: textarea
    id: privacy
    attributes:
      label: Privacy or security considerations
      description: Note whether the feature records audio, sends text/audio to a provider, stores data, or changes keyboard behavior.
